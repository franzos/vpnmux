name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable @ 1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../vpnmux-${{ matrix.target }}.tar.gz vpnmux
          cd ../../..
          sha256sum vpnmux-${{ matrix.target }}.tar.gz > vpnmux-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vpnmux-${{ matrix.target }}
          path: |
            vpnmux-${{ matrix.target }}.tar.gz
            vpnmux-${{ matrix.target }}.tar.gz.sha256

  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable @ 1.94.1

      - name: Install cargo-deb
        run: cargo install cargo-deb --version 3.7.0 --locked

      - name: Build deb package
        run: cargo deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vpnmux-deb
          path: target/debian/*.deb

  rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable @ 1.94.1

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --version 0.21.0 --locked

      - name: Build
        run: cargo build --release

      - name: Build rpm package
        run: cargo generate-rpm

      - name: Upload rpm artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vpnmux-rpm
          path: target/generate-rpm/*.rpm

  release:
    needs: [build, deb, rpm]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          draft: false
          files: |
            vpnmux-*.tar.gz
            vpnmux-*.tar.gz.sha256
            *.deb
            *.rpm
